name: Deploy Widget

on:
  push:
    branches: [main]
    paths:
      - 'configurator-widget/**'
      - '.github/workflows/widget-deploy.yml'
    tags: ['v*']

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: configurator-widget/package-lock.json

      - name: Install dependencies
        working-directory: configurator-widget
        run: npm ci

      - name: Build widget
        working-directory: configurator-widget
        run: npm run build

      - name: Install Vercel CLI
        run: npm install -g vercel@latest

      - name: Deploy to Vercel
        working-directory: configurator-widget
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_WIDGET_PROJECT_ID }}
        run: |
          if [ -z "$VERCEL_TOKEN" ]; then
            echo "::warning::VERCEL_TOKEN secret not configured — skipping deploy"
            exit 0
          fi
          vercel deploy --prod --yes --token "$VERCEL_TOKEN"

      - name: Log pinned version
        if: startsWith(github.ref, 'refs/tags/v')
        run: echo "Tagged release ${{ github.ref_name }} deployed"
