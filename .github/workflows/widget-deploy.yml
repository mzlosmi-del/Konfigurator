name: Deploy Widget

on:
  push:
    branches: [main]
    paths:
      - 'configurator-widget/**'
      - '.github/workflows/widget-deploy.yml'
  # Also trigger on version tags for pinned releases
  push-tags:
    tags: ['v*']

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: configurator-widget/package-lock.json

      - name: Install dependencies
        working-directory: configurator-widget
        run: npm ci

      - name: Build widget
        working-directory: configurator-widget
        run: npm run build

      - name: Deploy to Vercel (latest)
        working-directory: configurator-widget
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_WIDGET_PROJECT_ID }}
        run: |
          npm install -g vercel
          vercel deploy --prod --token $VERCEL_TOKEN

      - name: Tag release artifact
        if: startsWith(github.ref, 'refs/tags/v')
        env:
          WIDGET_VERSION: ${{ github.ref_name }}
        run: |
          # The pinned-version URL (widget@v1.2.3.js) is served by Vercel
          # via a path alias — add a vercel.json route in the widget project
          # that maps /widget@${WIDGET_VERSION}.js → /widget.js
          echo "Tagged release: $WIDGET_VERSION"
          echo "Pinned URL will be: /widget@${WIDGET_VERSION}.js"
