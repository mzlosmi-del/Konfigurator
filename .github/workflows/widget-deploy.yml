name: Build Widget

on:
  push:
    branches: [main]
    paths:
      - 'configurator-widget/**'
      - '.github/workflows/widget-deploy.yml'
    tags: ['v*']

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: configurator-widget/package-lock.json

      - name: Install dependencies
        working-directory: configurator-widget
        run: npm ci

      - name: Build widget
        working-directory: configurator-widget
        run: npm run build

      - name: Log release version
        if: startsWith(github.ref, 'refs/tags/v')
        run: echo "Building tagged release ${{ github.ref_name }}"
