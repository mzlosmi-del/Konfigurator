<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Configurator Widget CDN</title>
  <style>
    body { font-family: system-ui, sans-serif; max-width: 600px; margin: 60px auto; padding: 0 24px; color: #111; line-height: 1.6; }
    h1 { font-size: 1.1rem; font-weight: 600; }
    p  { color: #555; font-size: 0.875rem; }
    .url { background: #f4f4f5; border-radius: 6px; padding: 10px 14px; font-family: monospace; font-size: 0.85rem; word-break: break-all; margin: 12px 0; }
    pre { background: #f4f4f5; border-radius: 6px; padding: 14px; font-size: 0.8rem; overflow-x: auto; white-space: pre-wrap; }
  </style>
</head>
<body>
  <h1>✓ Widget CDN is live</h1>
  <p>The widget script is available at:</p>
  <div class="url" id="widget-url"></div>
  <p>Use it in your embed code:</p>
  <pre id="snippet"></pre>
  <script>
    const url = window.location.origin + '/widget.js'
    document.getElementById('widget-url').textContent = url
    document.getElementById('snippet').textContent =
      '<div\n' +
      '  data-supabase-url="https://YOUR_PROJECT.supabase.co"\n' +
      '  data-supabase-anon-key="YOUR_ANON_KEY"\n' +
      '  data-product-id="PRODUCT_UUID"\n' +
      '  data-tenant-id="TENANT_UUID"\n' +
      '></div>\n' +
      '<script src="' + url + '" async><\/script>'
  </script>
</body>
</html>
